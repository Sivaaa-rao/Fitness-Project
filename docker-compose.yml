services:
  mongo:
    image: mongo:7
    container_name: fitness-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - fitness-net

  kafka:
    image: apache/kafka:3.9.1
    container_name: fitness-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/bitnami/kafka
    networks:
      - fitness-net

  keycloak-postgres:
    image: postgres:16
    container_name: fitness-keycloak-postgres
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    ports:
      - "5432:5432"
    volumes:
      - keycloak-postgres-data:/var/lib/postgresql/data
    networks:
      - fitness-net

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: fitness-keycloak
    command: start-dev --import-realm
    depends_on:
      - keycloak-postgres
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    ports:
      - "8181:8080"
    volumes:
      - ./deployment/keycloak/realm-fitness.json:/opt/keycloak/data/import/realm-fitness.json:ro
    networks:
      - fitness-net

  eureka:
    build:
      context: ./eureka
    container_name: fitness-eureka
    environment:
      EUREKA_SERVER_PORT: 8761
    ports:
      - "8761:8761"
    networks:
      - fitness-net

  configserver:
    build:
      context: ./configserver
    container_name: fitness-configserver
    depends_on:
      - eureka
    environment:
      CONFIG_SERVER_PORT: 8888
    ports:
      - "8888:8888"
    networks:
      - fitness-net

  userservice:
    build:
      context: ./userservice
    container_name: fitness-userservice
    depends_on:
      - mongo
      - eureka
      - configserver
    environment:
      CONFIG_SERVER_URL: http://configserver:8888
      EUREKA_DEFAULT_ZONE: http://eureka:8761/eureka/
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
      EUREKA_CLIENT_SERVICE_URL_DEFAULT_ZONE: http://eureka:8761/eureka/
      SERVER_PORT: 8081
      USER_MONGODB_URI: mongodb://mongo:27017/fitness-micro-user
      USER_MONGODB_DATABASE: fitness-micro-user
      SPRING_DATA_MONGODB_URI: mongodb://mongo:27017/fitness-micro-user
      SPRING_DATA_MONGODB_DATABASE: fitness-micro-user
    ports:
      - "8081:8081"
    networks:
      - fitness-net

  activityservice:
    build:
      context: ./activityservice
    container_name: fitness-activityservice
    depends_on:
      - mongo
      - kafka
      - eureka
      - configserver
      - userservice
    environment:
      CONFIG_SERVER_URL: http://configserver:8888
      EUREKA_DEFAULT_ZONE: http://eureka:8761/eureka/
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
      EUREKA_CLIENT_SERVICE_URL_DEFAULT_ZONE: http://eureka:8761/eureka/
      SERVER_PORT: 8082
      ACTIVITY_MONGODB_URI: mongodb://mongo:27017/aiactivityfitness
      ACTIVITY_MONGODB_DATABASE: aiactivityfitness
      SPRING_DATA_MONGODB_URI: mongodb://mongo:27017/aiactivityfitness
      SPRING_DATA_MONGODB_DATABASE: aiactivityfitness
      USER_SERVICE_URL: http://userservice:8081
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_NAME: activity-events
      KAFKA_TOPIC_DELETE_NAME: activity-delete-events
    ports:
      - "8082:8082"
    networks:
      - fitness-net

  aiservice:
    build:
      context: ./aiservice
    container_name: fitness-aiservice
    depends_on:
      - mongo
      - kafka
      - eureka
      - configserver
    environment:
      CONFIG_SERVER_URL: http://configserver:8888
      EUREKA_DEFAULT_ZONE: http://eureka:8761/eureka/
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
      EUREKA_CLIENT_SERVICE_URL_DEFAULT_ZONE: http://eureka:8761/eureka/
      SERVER_PORT: 8083
      AI_MONGODB_URI: mongodb://mongo:27017/airecommendationfitness
      AI_MONGODB_DATABASE: airecommendationfitness
      SPRING_DATA_MONGODB_URI: mongodb://mongo:27017/airecommendationfitness
      SPRING_DATA_MONGODB_DATABASE: airecommendationfitness
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_NAME: activity-events
      KAFKA_TOPIC_DELETE_NAME: activity-delete-events
      GEMINI_API_URL: https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    ports:
      - "8083:8083"
    networks:
      - fitness-net

  gateway:
    build:
      context: ./gateway
    container_name: fitness-gateway
    depends_on:
      - keycloak
      - eureka
      - configserver
      - userservice
      - activityservice
      - aiservice
    environment:
      CONFIG_SERVER_URL: http://configserver:8888
      EUREKA_DEFAULT_ZONE: http://eureka:8761/eureka/
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
      EUREKA_CLIENT_SERVICE_URL_DEFAULT_ZONE: http://eureka:8761/eureka/
      SERVER_PORT: 8080
      KEYCLOAK_SERVER_URL: http://keycloak:8080
      KEYCLOAK_ADMIN_SERVER_URL: http://keycloak:8080
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/fitness/protocol/openid-connect/certs
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/fitness/protocol/openid-connect/certs
      KEYCLOAK_REALM: fitness
      KEYCLOAK_ADMIN_REALM: fitness
      KEYCLOAK_ADMIN_CLIENT_ID: fitlife-backend
      KEYCLOAK_ADMIN_CLIENT_SECRET: local-dev-secret
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:5143
      APP_CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:5143
      SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_0_ID: user-service
      SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_0_URI: lb://USER-SERVICE
      SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_0_PREDICATES_0: Path=/api/users/**
      SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_1_ID: activity-service
      SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_1_URI: lb://ACTIVITY-SERVICE
      SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_1_PREDICATES_0: Path=/api/activities/**
      SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_2_ID: ai-service
      SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_2_URI: lb://AI-SERVICE
      SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_2_PREDICATES_0: Path=/api/recommendations/**
    ports:
      - "8080:8080"
    networks:
      - fitness-net

  fitness-frontend:
    build:
      context: ./fitness-frontend
      args:
        VITE_API_BASE_URL: http://localhost:8080/api
        VITE_KEYCLOAK_URL: http://localhost:8181
        VITE_KEYCLOAK_REALM: fitness
        VITE_KEYCLOAK_CLIENT_ID: oauth2-pkce-client
        VITE_AUTH_REDIRECT_URI: http://localhost:5173
        VITE_KEYCLOAK_SCOPE: openid profile email offline_access
        VITE_CLOUDINARY_CLOUD_NAME: ${VITE_CLOUDINARY_CLOUD_NAME:-}
        VITE_CLOUDINARY_UPLOAD_PRESET: ${VITE_CLOUDINARY_UPLOAD_PRESET:-}
    container_name: fitness-frontend
    depends_on:
      - gateway
      - keycloak
    ports:
      - "5173:80"
    networks:
      - fitness-net

networks:
  fitness-net:
    driver: bridge

volumes:
  mongo-data:
  kafka-data:
  keycloak-postgres-data:
